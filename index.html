    /* БЛОК ЛІЧИЛЬНИКА ТАЙМЕРА */

    .time-box {

      box-shadow: 0 0 6px rgba(255,255,200,0.3), inset 0 0 4px rgba(255,255,200,0.2);

      min-width: 32px;
      text-align: center;

    }

    .time-sep {
      color: #ddd;
      font-size: 1.4rem;
      font-weight: 700;
      user-select: none;
      padding-top: 3px;
    }

    /* ФУТЕР */
    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: #ccc;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      padding: 6px 0;

    }

    footer a {
      color: #ddd;
      text-decoration: underline;
      transition: 0.2s;
    }

    footer a:hover {
      color: white;
    }

    /* Анімація появи головного блоку */
    main {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.9s ease;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* АДАПТИВНІСТЬ (як в оригіналі + покращення) */
    @media (max-width: 650px) {
      .background {
        top: -45vh;

      }

        margin-bottom: 10px;
      }
      .status {
        font-size: 1rem;

      }
      .desc {
        font-size: 1rem;

      }
      .cta-button {
        font-size: 15px;
        padding: 12px 24px;
        margin-bottom: 30px;
        width: auto;
        min-width: 230px;
      }
      .countdown {
        font-size: 1.1rem;
        padding: 12px 20px;
      }
      #timer {
        font-size: 1.6rem;
      }
      .time-box {
        padding: 4px 7px;
        min-width: 28px;
        font-size: 1rem;
      }
      .time-sep {
        font-size: 1.2rem;
      }
      .container {
        padding-top: 90px;
        padding-left: 15px;
        padding-right: 15px;
      }
      .logo {
        width: 110px;

    }

    @media (max-width: 480px) {
      .background {
        top: 0vh;

      }

    /* Додатковий комфорт */
    @media (max-width: 380px) {

      }
    }
  </style>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
  <header>
    <img src="i75_ArticleImage_237987.webp" alt="MEGOGO" class="logo" />
  </header>

  <main>
    <h1>УСИК – ВЕРХОВЕН</h1>
    <div class="status">
      <i class="fas fa-circle" style="color:#2ecc2e; font-size: 0.7rem;"></i> Зараз онлайн
    </div>
    <p class="desc">
      <i class="fas fa-ticket-alt"></i> Безкоштовний набір на трансляцію! <br> 
      Приймаю лише перших 100 людей по посиланню!

    <a href="https://t.me/+MKhgI6IVr083NGIy" class="cta-button" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-telegram"></i> Залишилось <span id="spots-btn">97</span> місць
    </a>

    <div class="countdown">
      🔥 НА САЙТІ 414 ЛЮДИНИ. ЗАВЕРШАЄТЬСЯ ЧЕРЕЗ <br>
      <div id="timer" class="timer">
        <span class="time-box">0</span>
        <span class="time-box">0</span>
        <span class="time-sep">:</span>
        <span class="time-box">0</span>

  <footer>

  </footer>
</div>

<script>
  (function() {
    // ------------------------------ УСИК - ВЕРХОВЕН ---------------------------------
    // Унікальні ключі для localStorage, щоб не перетиналися з оригіналом "Усик-Дюбуа"
    const STORAGE_END_KEY = "usykVerkhovenEndTime";
    const STORAGE_SPOTS_KEY = "usykVerkhovenSpots";
    
    // ----- Ініціалізація таймера (10 хвилин) -----
    let endTime = localStorage.getItem(STORAGE_END_KEY);
    const nowTime = new Date().getTime();
    
    if (!endTime) {
      // Запускаємо таймер на 10 хвилин з моменту першого завантаження
      endTime = nowTime + 10 * 60 * 1000; // 10 хвилин
      localStorage.setItem(STORAGE_END_KEY, endTime);
    } else {
      endTime = parseInt(endTime, 10);
      // Якщо з якоїсь причини час у минулому — перезапустимо (але залишаємо як є, відображатиме 0)
    }
    
    let timerInterval = null;
    
    function updateTimerUI() {
      const now = new Date().getTime();
      let distance = endTime - now;
      const digits = document.querySelectorAll("#timer .time-box");
      if (!digits.length) return;
      
      if (distance <= 0) {
        // Таймер завершено - всі нулі
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        digits.forEach((digit, idx) => {
          // Перші два "00" (години), потім хвилини та секунди
          if (idx === 0 || idx === 1) digit.textContent = "0";
          else if (idx === 2 || idx === 3) digit.textContent = "0";
          else if (idx === 4 || idx === 5) digit.textContent = "0";
        });
        return;
      }
      
      const totalMinutes = Math.floor(distance / (1000 * 60));
      const minutes = totalMinutes % 60;
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);
      
      const minStr = String(minutes).padStart(2, "0");
      const secStr = String(seconds).padStart(2, "0");
      
      // Формат: [0][0] : [min_tens][min_ones] : [sec_tens][sec_ones]
      if (digits.length >= 6) {
        digits[0].textContent = "0";
        digits[1].textContent = "0";
        digits[2].textContent = minStr[0];
        digits[3].textContent = minStr[1];
        digits[4].textContent = secStr[0];
        digits[5].textContent = secStr[1];
      }
    }
    
    updateTimerUI();
    if (endTime > new Date().getTime()) {
      timerInterval = setInterval(updateTimerUI, 1000);
    }
    
    // ----- Лічильник місць (зменшення кожні 5 секунд) -----
    let currentSpots = localStorage.getItem(STORAGE_SPOTS_KEY);
    if (currentSpots === null) {
      currentSpots = 97;
      localStorage.setItem(STORAGE_SPOTS_KEY, currentSpots);
    } else {
      currentSpots = parseInt(currentSpots, 10);
      if (isNaN(currentSpots)) currentSpots = 97;
    }
    
    const spotsSpan = document.getElementById("spots-btn");
    if (spotsSpan) spotsSpan.textContent = currentSpots;
    
    // Інтервал зменшення місць (копіюємо логіку оригіналу: тільки якщо >3)
    let spotsInterval = setInterval(() => {
      let storedSpots = localStorage.getItem(STORAGE_SPOTS_KEY);
      let spotsValue = storedSpots !== null ? parseInt(storedSpots, 10) : currentSpots;
      if (isNaN(spotsValue)) spotsValue = 97;
      
      if (spotsValue > 3) {
        spotsValue--;
        localStorage.setItem(STORAGE_SPOTS_KEY, spotsValue);
        if (spotsSpan) spotsSpan.textContent = spotsValue;
        currentSpots = spotsValue;
      } else {
        // Досягли ліміту – більше не зменшуємо, але інтервал можна залишити, перевірка не дасть спаду
        if (spotsValue <= 0) {
          // Якщо раптом стало 0 або менше, фіксуємо 0
          if (spotsSpan) spotsSpan.textContent = "0";
        } else {
          if (spotsSpan) spotsSpan.textContent = spotsValue;
        }
      }
    }, 5000);
    
    // Додатково синхронізуємо при перезавантаженні сторінки (якщо localStorage оновлено іншим табом, але то не критично)
    window.addEventListener('storage', function(e) {
      if (e.key === STORAGE_SPOTS_KEY) {
        let newVal = e.newValue ? parseInt(e.newValue, 10) : currentSpots;
        if (!isNaN(newVal) && spotsSpan) spotsSpan.textContent = newVal;
        currentSpots = newVal;
      }
      if (e.key === STORAGE_END_KEY && e.newValue) {
        endTime = parseInt(e.newValue, 10);
        if (timerInterval) clearInterval(timerInterval);
        updateTimerUI();
        if (endTime > new Date().getTime()) {
          timerInterval = setInterval(updateTimerUI, 1000);
        }
      }
    });
    
    // Анімація появи (main visible)
    const mainBlock = document.querySelector("main");
    if (mainBlock) {
      // Невелика затримка для плавності
      setTimeout(() => {
        mainBlock.classList.add("visible");
      }, 100);
    } else {
      document.addEventListener("DOMContentLoaded", () => {
        const mainElem = document.querySelector("main");
        if (mainElem) mainElem.classList.add("visible");
      });
    }
    
    // Додаткова ініціалізація після повного завантаження DOM
    document.addEventListener("DOMContentLoaded", function() {
      const mainOnLoad = document.querySelector("main");
      if (mainOnLoad && !mainOnLoad.classList.contains("visible")) {
        mainOnLoad.classList.add("visible");
      }
      // перевірка лічильника на всяк випадок
      const storedSpotsFinal = localStorage.getItem(STORAGE_SPOTS_KEY);
      if (storedSpotsFinal !== null) {
        let finalSpots = parseInt(storedSpotsFinal, 10);
        if (!isNaN(finalSpots) && spotsSpan) spotsSpan.textContent = finalSpots;
        currentSpots = finalSpots;
      } else {
        if (spotsSpan && spotsSpan.textContent === "97") {
          localStorage.setItem(STORAGE_SPOTS_KEY, 97);
        }
      }
      
      // Оновлюємо таймер
      if (endTime && endTime > new Date().getTime()) {
        if (timerInterval) clearInterval(timerInterval);
        updateTimerUI();
        timerInterval = setInterval(updateTimerUI, 1000);
      } else if (endTime && endTime <= new Date().getTime()) {
        updateTimerUI();
      }
    });
    
    // Cleanup у разі (не обов'язково, але елегантно), при виході сторінки інтервали очистяться самі,
    // але запобігаємо дублюванню, якщо раптом script двічі.
    window.addEventListener("beforeunload", function() {
      if (timerInterval) clearInterval(timerInterval);
      if (spotsInterval) clearInterval(spotsInterval);
    });
  })();
</script>
